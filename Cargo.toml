[package]
name = "ein"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
async-openai = { version = "=0.32.4", features = ["byot", "chat-completion"] }
clap = { version = "4.3.14", features = ["derive"] }
serde_json = "1"
serde = { version = "1", features = ["derive"] }
anyhow = "1"
