[package]
name = "ein_http"
version = "0.1.0"
edition = "2024"

# This crate only compiles for wasm32-wasip2. It uses wstd's HTTP client which
# wraps wasi:http/outgoing-handler — the standard WASM component HTTP interface.
# The host must expose wasi:http/outgoing-handler via wasmtime-wasi-http.

[dependencies]
anyhow     = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
wstd       = "0.6"
