syntax = "proto3";

package ein;

service Agent {
    // Persistent session: client streams prompts, server streams back events.
    rpc AgentSession(stream UserInput) returns (stream AgentEvent);
}

// A single message sent by the client during a session.
// The first message MUST be the `init` variant; all subsequent
// messages MUST be the `prompt` variant.
message UserInput {
    oneof input {
        SessionConfig init   = 1;
        string        prompt = 2;
    }
}

// Sent as the first UserInput to configure the session before any prompts.
message SessionConfig {
    // Filesystem paths the WASM plugins are allowed to access.
    // An empty list means no filesystem access is granted.
    repeated string allowed_paths = 1;
    // Network hostnames plugins may connect to.
    // An empty list means unrestricted network access.
    repeated string allowed_hosts = 2;
    // OpenRouter model identifier, e.g. "anthropic/claude-haiku-4.5".
    string model      = 3;
    // Maximum tokens the LLM may generate per completion request.
    int32  max_tokens = 4;
}

message AgentEvent {
    oneof event {
        ContentDelta   content_delta   = 1;
        ToolCallStart  tool_call_start = 2;
        ToolCallEnd    tool_call_end   = 3;
        AgentFinished  agent_finished  = 4;
        AgentError     agent_error     = 5;
        TokenUsage     token_usage     = 6;
    }
}

// Cumulative token usage for the session, emitted after each LLM call.
message TokenUsage {
    int32 prompt_tokens     = 1;
    int32 completion_tokens = 2;
    int32 total_tokens      = 3;
}

message ContentDelta {
    string text = 1;
}

message ToolCallStart {
    string tool_call_id = 1;
    string tool_name    = 2;
    string arguments    = 3;
}

message ToolCallEnd {
    string tool_call_id = 1;
    string tool_name    = 2;
    string result       = 3;
    string metadata     = 4; // JSON forwarded verbatim from the tool result
}

message AgentFinished {
    string final_content = 1;
}

message AgentError {
    string message = 1;
}
