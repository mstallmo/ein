syntax = "proto3";

package ein;

service Agent {
    // Persistent session: client streams prompts, server streams back events.
    rpc AgentSession(stream UserInput) returns (stream AgentEvent);
    // Returns a summary of all sessions stored on the server, newest-first.
    rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
    // Permanently deletes a session and its message history.
    rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
}

// A single message sent by the client during a session.
// The first message MUST be the `init` variant; subsequent messages
// may be `prompt`, `config_update`, or `clear_context`.
message UserInput {
    oneof input {
        SessionConfig init          = 1;
        string        prompt        = 2;
        SessionConfig config_update = 3;
        // Clears the model's in-memory context for this session.
        // The SQLite history is preserved; only the messages sent to
        // the LLM on the next prompt are wiped.
        bool          clear_context = 4;
    }
}

// Per-plugin configuration. Merged with the global session constraints when
// a plugin is instantiated: allowed_paths and allowed_hosts are unioned with
// the global lists; config entries are plugin-specific key-value pairs.
message PluginConfig {
    repeated string allowed_paths = 1;
    repeated string allowed_hosts = 2;
    string          params_json   = 3;
}

// Sent as the first UserInput to configure the session before any prompts.
//
// Global allowed_paths and allowed_hosts apply to all plugins. Per-plugin
// overrides (including model/credentials) live in plugin_configs, keyed by
// plugin name (e.g. "ein_openrouter", "ein_ollama", "Bash", "Read").
message SessionConfig {
    // Filesystem paths all WASM plugins are allowed to access.
    // An empty list means no filesystem access is granted globally.
    repeated string allowed_paths = 1;
    // Network hostnames all plugins may connect to.
    // An empty list means no network access is granted globally.
    repeated string allowed_hosts = 2;
    // Per-plugin configuration, keyed by plugin name.
    map<string, PluginConfig> plugin_configs = 3;
    // Name of the model client plugin to use (e.g. "ein_openrouter", "ein_ollama").
    // If empty, the server uses the first available plugin (backward compatible).
    string model_client_name = 4;
    // UUID v7 identifying the session. If empty, the server generates a new ID.
    // If set and a matching session exists in the store, its history is restored.
    string session_id = 5;
}

message AgentEvent {
    oneof event {
        ContentDelta    content_delta    = 1;
        ToolCallStart   tool_call_start  = 2;
        ToolCallEnd     tool_call_end    = 3;
        AgentFinished   agent_finished   = 4;
        AgentError      agent_error      = 5;
        TokenUsage      token_usage      = 6;
        ToolOutputChunk tool_output_chunk = 7;
        SessionStarted  session_started  = 8;
    }
}

// Cumulative token usage for the session, emitted after each LLM call.
message TokenUsage {
    int32 prompt_tokens     = 1;
    int32 completion_tokens = 2;
    int32 total_tokens      = 3;
}

message ContentDelta {
    string text = 1;
}

message ToolCallStart {
    string tool_call_id = 1;
    string tool_name    = 2;
    string arguments    = 3;
    string display_arg  = 4; // empty string = no display arg
}

message ToolCallEnd {
    string tool_call_id = 1;
    string tool_name    = 2;
    string result       = 3;
    string metadata     = 4; // JSON forwarded verbatim from the tool result
}

message AgentFinished {
    string final_content = 1;
}

message AgentError {
    string message = 1;
}

// A single line of stdout streamed from a running tool (currently Bash only).
message ToolOutputChunk {
    string tool_call_id = 1;
    string output       = 2;
}

// A tool call entry within a history message (used when replaying history to the client).
message HistoryToolCall {
    string tool_name   = 1;
    string arguments   = 2;
    string display_arg = 3; // empty string = no display arg
}

// A single message from the conversation history, sent to the client on session resume.
// Only user and assistant roles are included; system and tool messages are omitted.
message HistoryMessage {
    string                   role       = 1; // "user" | "assistant"
    string                   content    = 2;
    repeated HistoryToolCall tool_calls = 3;
}

// Emitted once at the start of every session, before any agent events.
// `resumed` is true when an existing session was loaded from the store.
// When `resumed` is true, `history` contains the prior conversation turns.
message SessionStarted {
    string                  session_id = 1;
    bool                    resumed    = 2;
    repeated HistoryMessage history    = 3;
}

message ListSessionsRequest {}

// A brief summary of one persisted session, returned by ListSessions.
message SessionSummary {
    string id                  = 1;
    int64  created_at          = 2; // Unix seconds
    string preview             = 3; // First user message, truncated to 80 chars
    string session_config_json = 4; // Stored config JSON for reconstructing SessionConfig on resume
}

message ListSessionsResponse {
    repeated SessionSummary sessions = 1; // Newest-first
}

message DeleteSessionRequest {
    string session_id = 1;
}

message DeleteSessionResponse {}
